# ref: tasks/main.yml

---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Ensure sudo is installed
  apt:
    name: sudo
    state: present

- name: Create sudo user
  user:
    name: "{{ user_name }}"
    groups: sudo
    shell: /bin/bash
    createhome: yes

# The user has no password (and SSH password auth is disabled), so the default
# password-requiring `sudo` group membership can't be used. Grant passwordless
# sudo so a key-only user can actually escalate. visudo -cf validates the file
# before install so a bad edit can never break sudo.
- name: Grant the user passwordless sudo
  copy:
    dest: "/etc/sudoers.d/{{ user_name }}"
    content: "{{ user_name }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: visudo -cf %s
  when: secure_user_passwordless_sudo | bool

- name: Create.ssh directory
  file:
    path: "/home/{{ user_name }}/.ssh"
    state: directory
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: 0700

- name: Copy root's authorized_keys
  copy:
    remote_src: true
    src: /root/.ssh/authorized_keys
    dest: "/home/{{ user_name }}/.ssh/authorized_keys"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
    mode: 0600

- name: Disable password authentication for SSH
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
  notify:
    - Restart SSH